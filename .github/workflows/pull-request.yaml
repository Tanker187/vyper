# jobs to validate pull request well-formedness

name: Validate PR metadata

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions:
  pull-requests: read

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: step-security/action-semantic-pull-request@bc0cf74f5be4ce34accdec1ae908dff38dc5def1 # v6.1.1
        name: Run conventional commit checker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # https://github.com/amannn/action-semantic-pull-request?tab=readme-ov-file#configuration
        with:
          types: |
            feat
            perf
            fix
            chore
            refactor
            release
          # ci: continuous integration
          # docs: documentation
          # test: test suite
          # lang: language changes
          # stdlib: changes to the stdlib
          # ux: language changes (UX)
          # parser: parser changes
          # tool: integration
          # ir: (old) IR/codegen changes
          # codegen: lowering from vyper AST to codegen
          # venom: venom changes
          scopes: |
            ci
            build
            docs
            test
            lang
            stdlib
            ux
            parser
            tool
            ir
            codegen
            venom
          requireScope: true
          subjectPattern: '^(?![A-Z]).+$'
          subjectPatternError: |
            Starts with uppercase letter: '{subject}'
            (Full PR title: '{title}')
          # type[scope]<optional !>: subject
          # use [] instead of () for aesthetics
          headerPattern: '^(\w*)(?:\[([\w$.\-*/ ]*)\])?!?: (.*)$'
